services:
  docling:
    container_name: deeix-chat-docling
    image: deeix-chat-docling:latest
    build:
      context: ../../
      dockerfile: docker/docling/Dockerfile
    ports:
      # Optional. Localhost-only by default. Configure the app to use http://host.docker.internal:8005/ocr when needed.
      - "127.0.0.1:8005:8005"
    restart: unless-stopped
    networks:
      - deeix-chat

networks:
  deeix-chat:
    # Required. Start a root compose profile first, or create this network manually.
    external: true
    name: deeix-chat-network
